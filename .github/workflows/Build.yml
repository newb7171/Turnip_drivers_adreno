name: Native ARM64 Turnip Build on Ubuntu 26.04

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-arm-script:
    # Uses GitHub's native ARM64 servers
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Uses docker to run the ubuntu:26.04 image with root permissions and explicit arm64 platform targeting
      - name: Run script in Ubuntu 26.04 ARM Docker container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            --user root \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:26.04 /bin/bash -c "
              apt-get update && apt-get install -y zip;
              chmod +x turnip-aarch64-linux.sh;
              ./turnip-aarch64-linux.sh
            "

      # Captures the zip file generated by your script
      - name: Upload Generated Zip
        uses: actions/upload-artifact@v4
        with:
          name: turnip-arm64-output
          path: ${{ github.workspace }}/*.zip
