name: Ubuntu AMD64 WineHQ WoW64 Build Environment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine Branch'
        required: false
        default: 'staging'
        type: choice
        options:
          - vanilla
          - staging
      wine_version:
        description: 'Wine Version (e.g., 9.22 or latest)'
        required: false
        default: 'latest'
        type: string
  schedule:
    # Runs at 00:00 UTC on day 1 of every 2nd month
    - cron: '0 0 1 */2 *'

env:
  BUILD_NAME: "wine-winlator-custom"
  USE_CCACHE: true

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:26.04
      options: --user root --platform linux/amd64

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Update Package Repositories
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update

      - name: Install Requested Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          
          # Core build tools and full feature dependency matrix
          apt-get install -y \
            build-essential \
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            gcc-mingw-w64 \
            mingw-w64 \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            gettext \
            libgettextpo-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-* \
            libmpg123-dev \
            libopenal-dev \
            libfaad-dev \
            libflac-dev \
            libvorbis-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev \
            libtheora-dev

      - name: Fetch WineHQ Source and Staging Patches
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          BUILD_DIR="/tmp/build_wine_${WINE_BRANCH}_${WINE_VERSION}"
          
          echo "Setting up Wine WoW64 Workspace..."
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          
          # Clone Official Upstream WineHQ Mirror
          git clone https://github.com/wine-mirror/wine.git wine
          SOURCE_DIR="wine"
          cd "$SOURCE_DIR"
          
          git config advice.detachedHead false
          
          if [ "$WINE_VERSION" != "latest" ]; then
            git checkout "wine-$WINE_VERSION"
          fi
          
          WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          FINAL_BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-wow64"
          
          PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
          STAGING_VERSION="v${PURE_VERSION}"
          
          # Process Staging patches if required
          if [ "$WINE_BRANCH" = "staging" ]; then
            echo "Downloading staging patches for format: ${STAGING_VERSION}"
            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"
            
            if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
              tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"
              STAGING_DIR=$(find . -maxdepth 1 -type d -name "*staging*" | head -1)
              if [ -n "$STAGING_DIR" ] && [ -d "$STAGING_DIR/staging" ]; then
                echo "Applying Staging Ecosystem Patches..."
                cd "$STAGING_DIR/staging"
                chmod +x patchinstall.py
                ./patchinstall.py --all --destdir=../../
                cd "../.."
              fi
            fi
          fi
          
          # Pass operational contextual state variables to environment pipeline
          echo "BUILD_NAME=$FINAL_BUILD_NAME" >> $GITHUB_ENV
          echo "WORKSPACE_SOURCE_DIR=$(pwd)" >> $GITHUB_ENV
          echo "PURE_VERSION=$PURE_VERSION" >> $GITHUB_ENV

      - name: Apply Winlator Compatibility Patches
        run: |
          cd ${{ env.WORKSPACE_SOURCE_DIR }}
          echo "Injecting Winlator isolated /tmp runtime folder redirection..."
          
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs -r sed -i 's|/tmp/|/data/data/com.winlator/files/rootfs/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/rootfs/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/rootfs/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/rootfs/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/rootfs/usr/tmp"|g' {} +

      - name: Apply Stability Upstream Fixes
        run: |
          cd ${{ env.WORKSPACE_SOURCE_DIR }}
          VERSION_MAJOR=$(echo "${{ env.PURE_VERSION }}" | cut -d. -f1)
          VERSION_MINOR=$(echo "${{ env.PURE_VERSION }}" | cut -d. -f2)
          
          if [ "$VERSION_MAJOR" -gt 9 ] || [ "$VERSION_MAJOR" -eq 9 -a "$VERSION_MINOR" -ge 10 ]; then
            echo "Applying 9.10+ DXGI Manager Stability patch..."
            wget https://github.com/afeimod/linbox/raw/main/path/wine_do_not_create_dxgi_manager2.patch
            if [ -f "dlls/mfplat/main.c" ]; then
              patch -p1 < wine_do_not_create_dxgi_manager2.patch
            fi
          else
            echo "Applying sub-9.10 multimedia routing patches..."
            wget -O fix_wine9.2_mfplat.sh https://github.com/afeimod/linbox/raw/main/path/fix_wine9.2_mfplat.sh
            chmod +x fix_wine9.2_mfplat.sh
            ./fix_wine9.2_mfplat.sh
          fi

      - name: Compile True WoW64 Architecture Build
        run: |
          cd ${{ env.WORKSPACE_SOURCE_DIR }}
          mkdir -p build-wow64
          cd build-wow64
          
          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          
          OPTIMIZATIONS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CFLAGS=$OPTIMIZATIONS
          export CXXFLAGS=$OPTIMIZATIONS
          export CROSSCFLAGS=$OPTIMIZATIONS
          export CROSSCXXFLAGS=$OPTIMIZATIONS

          echo "Configuring Wine WoW64 compilation landscape..."
          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-wow64 \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          echo "Compiling structural targets..."
          make -j$(nproc)
          make install

      - name: Prepare Deployment Package Layout
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          
          echo "Copying staging runtime assets..."
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/

      - name: Create Compressed Binary Archive
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          
          echo "=== Previewing Structural Tree Assets ==="
          find wine-package -type f | sort | head -20
          
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          
          echo "Archive Complete:"
          ls -lh *.tar.xz

      - name: Generate Checksums
        run: |
          cd $GITHUB_WORKSPACE
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 Bundle Assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}-dist
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 60

      - name: Publish Production Release Assets
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: Wine HQ WoW64 (${{ github.event.inputs.wine_branch || 'staging' }}) Build
          body: |
            # Upstream WineHQ True WoW64 Engine
            
            ## Architecture Details
            - **Upstream Engine Base**: Official WineHQ Mirror Archive
            - **Target Infrastructure Setup**: True WoW64 Structure (Co-execution layer routing 32-bit and 64-bit Windows applications natively)
            - **Operational Intended Use-Case Layer**: Advanced Android x86 emulation execution wrappers (Termux / Winlator backend compatible environment)
            - **Vulkan Driver System Stack**: Explicitly Enabled
            - **Multimedia Backend Matrix**: Expanded GStreamer Engine Core Hooks
            - **System Localization Hooks**: Intact Standard Posix Layout

            ## Installation Guidelines
            Decompress the archive payload contents and allocate the nested dynamic directories into your container structure system path layouts.
          files: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
