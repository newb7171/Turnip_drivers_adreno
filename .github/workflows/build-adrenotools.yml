name: Turnip adrenotools

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-26.04-arm

    container:
      image: debian:sid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Turnip
        shell: bash
        run: |
          set -euo pipefail

          workdir="$(pwd)/turnip_workdir"
          mesasrc="https://gitlab.freedesktop.org/mesa/mesa.git"
          BUILD_VERSION="26.2.0_V4"
          PATCH_1="https://raw.githubusercontent.com/newb7171/Turnip_drivers_adreno/main/Gpu-Hacks.patch"
          PATCH_2="https://raw.githubusercontent.com/newb7171/Turnip_drivers_adreno/main/KGSL-hacks-whitebelyash.diff"

          echo "BUILD_VERSION=$BUILD_VERSION" >> "$GITHUB_ENV"

          echo "Installing build dependencies..."

          sed -i '/^Types:/ s/deb$/deb deb-src/' /etc/apt/sources.list.d/debian.sources

          apt-get update
          apt-get build-dep mesa -y -qq
          apt-get build-dep libarchive -y -qq

          apt-get install -y \
            pkg-config \
            git \
            cmake \
            wget \
            zip \
            patchelf \
            libclc-21-dev \
            meson \
            ninja-build \
            clang \
            llvm \
            -qq

          mkdir -p "$workdir"
          cd "$workdir"

          mkdir -p turnip

          rm -rf r29 mesa
          rm -f android-ndk-r29-linux-aarch64.tar.gz

          wget -q -nv https://github.com/SnowNF/ndk-aarch64-linux/releases/download/0.0.2/android-ndk-r29-linux-aarch64.tar.gz
          tar -xzf android-ndk-r29-linux-aarch64.tar.gz

          ndk="$workdir/r29/toolchains/llvm/prebuilt/linux-x86_64/bin"

          git clone "$mesasrc" --depth=1
          cd mesa

          echo "Applying patches..."

          wget "$PATCH_1" -O patch.patch
          wget "$PATCH_2" -O whitebelyash-patch-experimental.diff

          git apply patch.patch
          patch -p1 whitebelyash-patch-experimental.diff

          rm -f patch.patch whitebelyash-patch-experimental.diff

          echo "#define TUGEN8_DRV_VERSION \"$BUILD_VERSION\"" > ./src/freedreno/vulkan/tu_version.h

          export PATH="$workdir/bin:$ndk:$PATH"
          export CC=clang
          export CXX=clang++
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip
          export OBJDUMP=llvm-objdump
          export OBJCOPY=llvm-objcopy
          export LDFLAGS="-fuse-ld=lld"

          cat > android-aarch64.txt <<EOF
          [binaries]
          ar = '$ndk/llvm-ar'
          c = ['$ndk/aarch64-linux-android35-clang', '-fno-exceptions', '-fno-unwind-tables', '-fno-asynchronous-unwind-tables', '--start-no-unused-arguments', '-static-libstdc++', '--end-no-unused-arguments', '-Wno-error']
          cpp = ['$ndk/aarch64-linux-android35-clang++', '-fno-exceptions', '-fno-unwind-tables', '-fno-asynchronous-unwind-tables', '--start-no-unused-arguments', '-static-libstdc++', '--end-no-unused-arguments', '-Wno-error']
          c_ld = '$ndk/ld.lld'
          cpp_ld = '$ndk/ld.lld'
          strip = '$ndk/llvm-strip'
          pkg-config = ['env', 'PKG_CONFIG_LIBDIR=$ndk/pkg-config', '/usr/bin/pkg-config']

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'
          EOF

          cat > native.txt <<EOF
          [binaries]
          c = '/usr/bin/clang'
          cpp = '/usr/bin/clang++'
          ar = '/usr/bin/llvm-ar'
          strip = '/usr/bin/llvm-strip'
          c_ld = 'ld.lld'
          cpp_ld = 'ld.lld'
          pkg-config = '/usr/bin/pkg-config'

          [build_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'armv8'
          endian = 'little'
          EOF

          rm -rf build-android-aarch64

          meson setup build-android-aarch64 \
            --cross-file android-aarch64.txt \
            --native-file native.txt \
            --prefix "$workdir/turnip" \
            -Dbuildtype=debugoptimized \
            -Dstrip=true \
            -Dplatforms=android \
            -Dvideo-codecs=all \
            -Dplatform-sdk-version=35 \
            -Dandroid-stub=true \
            -Dgallium-drivers= \
            -Dvulkan-drivers=freedreno \
            -Dvulkan-beta=true \
            -Dfreedreno-kmds=kgsl \
            -Degl=disabled

          ninja -C build-android-aarch64 install

          cd "$workdir/turnip/lib"

          patchelf --set-soname vulkan.adreno.so libvulkan_freedreno.so
          mv libvulkan_freedreno.so vulkan.adreno.so

          cat > meta.json <<EOF
          {
            "schemaVersion": 1,
            "name": "Mesa Turnip v$BUILD_VERSION",
            "description": "Built from source",
            "author": "JustCallMeJade",
            "packageVersion": "1",
            "vendor": "Mesa3d",
            "driverVersion": "Vulkan 1.4.335",
            "minApi": 28,
            "libraryName": "vulkan.adreno.so"
          }
          EOF

          zip -9 "$workdir/turnip/Turnip-v$BUILD_VERSION.zip" \
            vulkan.adreno.so \
            meta.json

          echo "build complete."

      - name: Debug zip output
        run: |
          find turnip_workdir -type f -name "*.zip" -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-build
          path: turnip_workdir/turnip/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Turnip-v${{ env.BUILD_VERSION }}
          name: Turnip-v${{ env.BUILD_VERSION }}
          files: turnip_workdir/turnip/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
