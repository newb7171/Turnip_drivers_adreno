name: Turnip adrenotools

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    container:
      image: debian:sid
      options: --user root
    env:
      USERNAME: Turnip-adrenotools
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update apt and install dependencies
        run: apt update && apt install -y python3 python3-pip git

      - name: Clone, install, and build
        run: |
          git clone https://github.com/JustCallMeJade/Random-py-project
          cd Random-py-project
          pip install . --break-system-packages
          cd
          build-now

      - name: Debug zip output
        run: |
          find turnip_workdir -type f -name "*.zip" -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-build
          path: turnip_workdir/turnip/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: v${{ env.BUILD_VERSION }}
          files: turnip_workdir/turnip/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
