name: Build Turnip

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: Build Version
        required: true
        default: "1.0"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_VERSION: ${{ github.event.inputs.build_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Pull Ubuntu AMD64
        run: |
          docker pull --platform linux/amd64 ubuntu:24.04

      - name: Run build script
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -e BUILD_VERSION="${BUILD_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ubuntu:24.04 \
            bash -c "
              set -eux

              export DEBIAN_FRONTEND=noninteractive

              sed -i 's/^# deb-src/deb-src/g' /etc/apt/sources.list || true

              apt update

              apt install -y \
                git \
                curl \
                patchelf \
                meson \
                ninja-build \
                unzip \
                python3-pip \
                flex \
                bison \
                zip \
                glslang-tools \
                ccache \
                build-essential \
                pkg-config

              apt build-dep mesa -y

              pip3 install mako

              chmod +x test1.sh
              ./test1.sh
            "

      - name: Upload ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: turnip-builds
          path: |
            *.zip
            **/*.zip
