name: Build Turnip (aarch64 Android)

on:
  workflow_dispatch:
  push:
    paths:
      - 'turnip-aarch64-linux.sh'
      - '.github/workflows/build-turnip.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            meson \
            ninja-build \
            patchelf \
            unzip \
            curl \
            python3-pip \
            flex \
            bison \
            zip \
            glslang-tools \
            wget

      - name: Enable source repositories
        run: |
          sudo sed -i '/^Types: deb$/s/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update

      - name: Install Mesa build dependencies
        run: sudo apt build-dep mesa -y

      - name: Make build script executable
        run: chmod +x turnip-aarch64-linux.sh

      - name: Run build script
        run: ./turnip-aarch64-linux.sh

      - name: Upload Turnip build artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-build
          path: /tmp/turnip/lib/Turnip-v*.zip
          if-no-files-found: error
